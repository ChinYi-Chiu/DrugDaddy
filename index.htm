<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墮落老爹：全方位環境模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: manipulation; }
        canvas { image-rendering: pixelated; display: block; margin: 0 auto; background: #000; border: 4px solid #1e293b; max-width: 100%; height: auto; }
        .pixel-border { border: 4px solid #334155; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .glass-ui { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        input[type="range"] { accent-color: #ef4444; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 sm:p-4">

    <!-- 初始設定界面 -->
    <div id="setup-overlay" class="fixed inset-0 z-50 flex items-center justify-center glass-ui">
        <div class="bg-slate-900 p-6 sm:p-8 rounded-2xl border-2 border-slate-700 text-center max-w-sm w-full shadow-2xl">
            <h1 class="text-2xl font-bold text-red-500 mb-6 tracking-widest">角色初始化</h1>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs text-slate-400">你的名字</label>
                    <input type="text" id="player-name-input" value="阿強" class="w-full bg-slate-800 border border-slate-600 p-2 rounded outline-none focus:border-red-500 text-sm">
                </div>
                <div>
                    <label class="text-xs text-slate-400">設定城市 (僅顯示)</label>
                    <input type="text" id="city-input" value="台北" class="w-full bg-slate-800 border border-slate-600 p-2 rounded outline-none text-sm">
                </div>
                <div>
                    <label class="text-xs text-slate-400">時區設定 (UTC Offset)</label>
                    <select id="timezone-input" class="w-full bg-slate-800 border border-slate-600 p-2 rounded outline-none text-sm">
                        <option value="-8">UTC-8 (洛杉磯)</option>
                        <option value="0">UTC+0 (倫敦)</option>
                        <option value="8" selected>UTC+8 (台北/北京/香港)</option>
                        <option value="9">UTC+9 (東京/首爾)</option>
                    </select>
                </div>
            </div>

            <button onclick="initGame()" class="w-full mt-8 bg-red-600 hover:bg-red-500 p-3 rounded font-bold transition-all active:scale-95 shadow-lg">
                進入模擬環境
            </button>
            <p class="mt-4 text-[10px] text-slate-500 italic">警告：環境音效將在點擊後啟動</p>
        </div>
    </div>

    <!-- 遊戲主界面 -->
    <div id="game-ui" class="hidden w-full max-w-xl">
        <div class="flex justify-between items-end mb-2 px-1">
            <div class="flex flex-col">
                <div id="dad-title" class="text-xs sm:text-sm font-bold text-zinc-300">載入中...</div>
                <div id="city-display" class="text-[10px] text-zinc-500">台北 | UTC+8</div>
            </div>
            <div id="weather-display" class="text-right">
                <div id="weather-text" class="text-[10px] text-sky-400 uppercase font-black">晴天</div>
                <div id="clock-display" class="text-lg font-mono text-white leading-none">00:00:00</div>
            </div>
        </div>

        <canvas id="main-canvas" width="240" height="160" class="w-full pixel-border rounded-lg"></canvas>

        <!-- 數據面板 -->
        <div class="grid grid-cols-2 gap-4 mt-4 glass-ui p-4 rounded-xl border border-slate-800 shadow-inner">
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] uppercase font-bold text-emerald-500"><span>健康狀態</span><span id="label-health">100%</span></div>
                <div class="h-1.5 bg-black rounded-full overflow-hidden">
                    <div id="bar-health" class="bg-emerald-500 h-full w-full transition-all duration-1000"></div>
                </div>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] uppercase font-bold text-red-600"><span>藥癮程度</span><span id="label-addiction">20%</span></div>
                <div class="h-1.5 bg-black rounded-full overflow-hidden">
                    <div id="bar-addiction" class="bg-red-600 h-full w-1/5 transition-all duration-1000"></div>
                </div>
            </div>
        </div>

        <!-- 互動區 -->
        <div class="flex gap-2 mt-4">
            <div id="dialogue" class="flex-grow p-3 bg-black/60 rounded-lg text-xs italic text-zinc-300 min-h-[50px] border-l-2 border-red-600 flex items-center">
                等待數據同步...
            </div>
            <div class="flex flex-col gap-1">
                <button onclick="changeWeather()" class="bg-slate-800 p-2 rounded text-[10px] hover:bg-slate-700">切換天氣</button>
                <div class="flex items-center gap-2 bg-slate-800 p-1 rounded">
                    <span class="text-[10px] px-1">🔊</span>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" class="w-12">
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 核心變數 ---
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        let playerName = "";
        let cityName = "";
        let utcOffset = 8;
        let weatherType = "SUNNY"; 
        let weatherParticles = [];
        let flashOpacity = 0;
        let audioCtx = null;
        let bgmNode = null;
        let noiseNode = null;

        const state = {
            health: 80,
            addiction: 15,
            isRecovering: false,
            lastTick: Date.now()
        };

        // --- 初始化 ---
        function initGame() {
            playerName = document.getElementById('player-name-input').value || "阿強";
            cityName = document.getElementById('city-input').value || "台北";
            utcOffset = parseInt(document.getElementById('timezone-timezone-input')?.value || 8);
            
            document.getElementById('setup-overlay').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('city-display').innerText = `${cityName} | UTC${utcOffset >= 0 ? '+' : ''}${utcOffset}`;
            
            // 啟動渲染與音效
            initAudio();
            gameLoop();
        }

        // --- 音效渲染系統 (Web Audio API) ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. 背景音樂渲染 (簡易方波旋律)
            const playBGM = () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(110, audioCtx.currentTime); // A2
                
                // 憂鬱的 8-bit 旋律
                const notes = [110, 123, 130, 146];
                let i = 0;
                setInterval(() => {
                    osc.frequency.setTargetAtTime(notes[i % notes.length], audioCtx.currentTime, 0.1);
                    i++;
                }, 1000);

                gain.gain.value = 0.02; // 很小聲的底噪感
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
            };

            // 2. 噪聲生成器 (用於雨聲與雷聲)
            const createNoise = () => {
                const bufferSize = 2 * audioCtx.sampleRate;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                const whiteNoise = audioCtx.createBufferSource();
                whiteNoise.buffer = buffer;
                whiteNoise.loop = true;

                const filter = audioCtx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.value = 400; // 預設雨聲偏低

                const gain = audioCtx.createGain();
                gain.gain.value = 0;

                whiteNoise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                whiteNoise.start();
                return { gain, filter };
            };

            playBGM();
            noiseNode = createNoise();
            updateAudioByWeather();
        }

        function updateAudioByWeather() {
            if (!noiseNode) return;
            const vol = parseFloat(document.getElementById('volume-slider').value);
            
            if (weatherType === "RAIN" || weatherType === "TYPHOON") {
                noiseNode.gain.gain.setTargetAtTime(0.1 * vol, audioCtx.currentTime, 1);
                noiseNode.filter.frequency.setTargetAtTime(1000, audioCtx.currentTime, 1);
            } else if (weatherType === "THUNDER") {
                noiseNode.gain.gain.setTargetAtTime(0.15 * vol, audioCtx.currentTime, 1);
                noiseNode.filter.frequency.setTargetAtTime(600, audioCtx.currentTime, 1);
            } else {
                noiseNode.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 1);
            }
        }

        function playThunderStrike() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(40, audioCtx.currentTime);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2);
        }

        // --- 天氣與時間 ---
        function changeWeather() {
            const list = ["SUNNY", "RAIN", "THUNDER", "CLOUDY", "TYPHOON"];
            weatherType = list[(list.indexOf(weatherType) + 1) % list.length];
            document.getElementById('weather-text').innerText = weatherType;
            updateAudioByWeather();
        }

        function getAdjustedTime() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * utcOffset));
        }

        // --- 命名邏輯 ---
        function updateDadIdentity() {
            let prefix = "";
            if (state.addiction > 70) prefix = "神智不清的廢物重度毒蟲";
            else if (state.addiction > 30) prefix = "頹廢的毒蟲";
            else if (state.addiction > 0) prefix = state.isRecovering ? "努力戒毒中的毒蟲" : "邊緣掙扎的廢物毒蟲";
            else prefix = "煥然一新的好";
            document.getElementById('dad-title').innerText = `${playerName}的${prefix}老爹`;
        }

        // --- 渲染 Loop ---
        function draw() {
            const time = getAdjustedTime();
            document.getElementById('clock-display').innerText = time.toTimeString().split(' ')[0];
            const hour = time.getHours();

            // 1. 窗外底色
            let skyBase = "#1e1b4b"; // 深夜
            if (hour >= 6 && hour < 10) skyBase = "#fb923c"; // 晨
            if (hour >= 10 && hour < 16) skyBase = "#38bdf8"; // 晝
            if (hour >= 16 && hour < 19) skyBase = "#4338ca"; // 暮
            
            ctx.fillStyle = skyBase;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 窗外天文 (太陽/月亮)
            const sunY = 40 + Math.sin((hour - 6) * Math.PI / 12) * -20;
            if (hour >= 6 && hour <= 18) {
                ctx.fillStyle = "#fde047";
                ctx.beginPath(); ctx.arc(60, sunY, 6, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = "#f8fafc";
                ctx.beginPath(); ctx.arc(180, 40, 5, 0, Math.PI*2); ctx.fill();
            }

            // 3. 窗戶框架 (中間大窗)
            const winX = 40, winY = 20, winW = 80, winH = 60;
            
            // 窗外粒子
            if (weatherType !== "SUNNY") {
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                weatherParticles.forEach(p => {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.angle*5, p.y + 5);
                    ctx.stroke();
                });
            }

            // 室內牆面遮蓋
            ctx.fillStyle = "#0f172a";
            // 挖洞 (窗戶)
            ctx.fillRect(0, 0, winX, 160);
            ctx.fillRect(winX + winW, 0, canvas.width - (winX+winW), 160);
            ctx.fillRect(winX, 0, winW, winY);
            ctx.fillRect(winX, winY + winH, winW, 160 - (winY+winH));
            
            // 窗框線條
            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 2;
            ctx.strokeRect(winX, winY, winW, winH);
            ctx.beginPath(); ctx.moveTo(winX + winW/2, winY); ctx.lineTo(winX+winW/2, winY+winH); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(winX, winY + winH/2); ctx.lineTo(winX+winW, winY+winH/2); ctx.stroke();

            // 4. 老爹渲染
            const dadBreathe = Math.sin(Date.now() / 500) * 1.5;
            const dx = 160, dy = 135;
            
            // 身體
            ctx.fillStyle = "#475569";
            ctx.fillRect(dx-6, dy-18+dadBreathe, 12, 18);
            // 頭
            ctx.fillStyle = "#fecaca";
            ctx.fillRect(dx-5, dy-28+dadBreathe*1.2, 10, 10);
            // 眼睛
            ctx.fillStyle = state.addiction > 50 ? "#ef4444" : "#000";
            ctx.fillRect(dx-3, dy-24+dadBreathe, 2, 2);
            ctx.fillRect(dx+1, dy-24+dadBreathe, 2, 2);

            // 5. 地板
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(0, 140, 240, 20);

            // 6. 晝夜與天氣遮罩
            let maskOpacity = 0;
            if (hour < 5 || hour > 20) maskOpacity = 0.5; // 深夜
            else if (hour < 7 || hour > 18) maskOpacity = 0.2; // 昏暗
            
            if (weatherType === "CLOUDY" || weatherType === "RAIN") maskOpacity += 0.1;
            if (weatherType === "TYPHOON") maskOpacity += 0.2;

            ctx.fillStyle = `rgba(0, 0, 50, ${maskOpacity})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 閃電觸發
            if (weatherType === "THUNDER" && Math.random() > 0.99) {
                flashOpacity = 0.8;
                playThunderStrike();
            }
            if (flashOpacity > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flashOpacity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                flashOpacity -= 0.05;
            }
        }

        function updateParticles() {
            if (weatherType === "RAIN" || weatherType === "THUNDER" || weatherType === "TYPHOON") {
                for (let i = 0; i < (weatherType === "TYPHOON" ? 10 : 3); i++) {
                    weatherParticles.push({
                        x: Math.random() * 240 + (weatherType === "TYPHOON" ? 40 : 0),
                        y: -5,
                        v: Math.random() * 5 + 5,
                        angle: weatherType === "TYPHOON" ? 0.6 : 0
                    });
                }
            }
            weatherParticles = weatherParticles.filter(p => {
                p.y += p.v;
                p.x -= (p.angle * p.v);
                return p.y < 160;
            });
        }

        function gameLoop() {
            updateParticles();
            updateDadIdentity();
            draw();
            
            // 邏輯數值更新
            state.addiction += 0.005;
            document.getElementById('bar-addiction').style.width = `${Math.min(100, state.addiction)}%`;
            document.getElementById('label-addiction').innerText = `${Math.floor(state.addiction)}%`;

            requestAnimationFrame(gameLoop);
        }

        // 音量控制監聽
        document.getElementById('volume-slider').addEventListener('input', updateAudioByWeather);
    </script>
</body>
</html>
