<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墮落老爹：全球環境同步模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'DotGothic16', sans-serif; }
        canvas { image-rendering: pixelated; display: block; margin: 0 auto; background: #000; border: 4px solid #334155; }
        .pixel-border { border: 4px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .glass-ui { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; font-size: 12px !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- 初始設定界面 -->
    <div id="setup-overlay" class="fixed inset-0 z-50 flex items-center justify-center glass-ui">
        <div class="p-8 rounded-2xl border-2 border-slate-700 text-center max-w-md w-full">
            <h1 class="text-3xl font-bold text-red-500 mb-2 italic">DADDY ISSUES</h1>
            <p class="text-[10px] text-slate-500 mb-6 uppercase tracking-[0.2em]">Global Environment Simulator</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] text-slate-400">你的名字</label>
                    <input type="text" id="player-name-input" placeholder="阿強" class="w-full p-2 rounded">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400">時區偏移 (UTC)</label>
                        <select id="timezone-input" class="w-full p-2 rounded">
                            <option value="-12">-12</option><option value="-8">-8</option>
                            <option value="0">0 (GMT)</option><option value="7">+7</option>
                            <option value="8" selected>+8 (Taipei/HK)</option><option value="9">+9 (Tokyo)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400">城市/位置 (英文)</label>
                        <input type="text" id="location-input" placeholder="Taipei" class="w-full p-2 rounded">
                    </div>
                </div>
                <div class="text-[8px] text-slate-500 italic">
                    * 天氣系統預設為模擬模式，若有 API Key 可於代碼內啟用真實同步。
                </div>
            </div>

            <button onclick="initGame()" class="w-full bg-red-600 hover:bg-red-500 p-3 rounded mt-6 font-bold transition-all shadow-lg active:scale-95">
                開始同步人生
            </button>
        </div>
    </div>

    <!-- 遊戲主界面 -->
    <div id="game-ui" class="hidden w-full max-w-xl">
        <div class="flex justify-between items-end mb-2 px-1">
            <div class="flex flex-col">
                <div id="dad-title" class="text-sm font-bold text-zinc-200">老爹載入中...</div>
                <div id="local-time-display" class="text-[10px] text-zinc-500">00:00:00 UTC+8</div>
            </div>
            <div class="text-right">
                <div id="weather-label" class="text-[10px] text-sky-400 font-bold uppercase tracking-wider">Loading Weather...</div>
                <div id="location-label" class="text-[8px] text-zinc-500">TAIPEI, TW</div>
            </div>
        </div>

        <div class="relative">
            <canvas id="main-canvas" width="280" height="180" class="w-full pixel-border"></canvas>
            <div id="action-hint" class="absolute top-2 right-2 text-[8px] text-white/20 pointer-events-none">點擊窗戶切換視角</div>
        </div>

        <!-- 狀態面板 -->
        <div class="mt-4 grid grid-cols-3 gap-2">
            <div class="glass-ui p-3 rounded-lg flex flex-col items-center">
                <span class="text-[8px] text-zinc-500 uppercase">健康</span>
                <span id="val-health" class="text-lg font-bold text-emerald-500">80</span>
                <div class="w-full bg-black h-1 rounded-full mt-1 overflow-hidden">
                    <div id="bar-health" class="bg-emerald-500 h-full transition-all"></div>
                </div>
            </div>
            <div class="glass-ui p-3 rounded-lg flex flex-col items-center">
                <span class="text-[8px] text-zinc-500 uppercase">毒癮</span>
                <span id="val-addiction" class="text-lg font-bold text-red-500">20</span>
                <div class="w-full bg-black h-1 rounded-full mt-1 overflow-hidden">
                    <div id="bar-addiction" class="bg-red-600 h-full transition-all"></div>
                </div>
            </div>
            <div class="glass-ui p-3 rounded-lg flex flex-col items-center">
                <span class="text-[8px] text-zinc-500 uppercase">進度</span>
                <span id="val-recovery" class="text-lg font-bold text-sky-500">0</span>
                <div class="w-full bg-black h-1 rounded-full mt-1 overflow-hidden">
                    <div id="bar-recovery" class="bg-sky-500 h-full transition-all"></div>
                </div>
            </div>
        </div>

        <div id="dialogue" class="mt-4 p-3 bg-slate-900/80 rounded border-l-2 border-red-500 text-xs italic text-zinc-300 min-h-[50px]">
            環境已同步。
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        
        // 核心設定
        let config = {
            playerName: "阿強",
            timezone: 8,
            location: "Taipei",
            apiKey: "" // 在此填入 OpenWeather API Key 可啟用真實同步
        };

        let weather = "SUNNY"; // SUNNY, RAINY, THUNDER, CLOUDY, TYPHOON, SNOW
        let particles = [];
        let flashEffect = 0;
        let starField = [];

        const dad = {
            health: 80,
            addiction: 15,
            recovery: 0,
            isDead: false,
            action: 'IDLE'
        };

        // 初始化星星
        for(let i=0; i<30; i++) starField.push({x: Math.random()*80 + 40, y: Math.random()*60 + 20, s: Math.random()*1});

        function initGame() {
            config.playerName = document.getElementById('player-name-input').value || "阿強";
            config.timezone = parseInt(document.getElementById('timezone-input').value);
            config.location = document.getElementById('location-input').value || "Taipei";
            
            document.getElementById('location-label').innerText = config.location.toUpperCase();
            document.getElementById('setup-overlay').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');

            fetchWeather();
            requestAnimationFrame(tick);
        }

        async function fetchWeather() {
            if (config.apiKey) {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${config.location}&appid=${config.apiKey}`);
                    const data = await res.json();
                    const main = data.weather[0].main.toUpperCase();
                    if (main.includes("RAIN")) weather = "RAINY";
                    else if (main.includes("CLOUD")) weather = "CLOUDY";
                    else if (main.includes("THUNDER")) weather = "THUNDER";
                    else weather = "SUNNY";
                    document.getElementById('weather-label').innerText = `${main} ${Math.round(data.main.temp - 273.15)}°C`;
                } catch(e) { console.error("Weather API Error"); }
            } else {
                // 模擬模式
                const ws = ["SUNNY", "RAINY", "THUNDER", "TYPHOON"];
                weather = ws[Math.floor(Math.random() * ws.length)];
                document.getElementById('weather-label').innerText = `${weather} (SIMULATED)`;
            }
        }

        function getTargetTime() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * config.timezone));
        }

        function updateLogic() {
            const targetNow = getTargetTime();
            document.getElementById('local-time-display').innerText = `${targetNow.toLocaleTimeString()} (UTC${config.timezone >= 0 ? '+' : ''}${config.timezone})`;

            // 數值連動
            dad.addiction += 0.005;
            if (dad.addiction > 100) { dad.addiction = 100; dad.health -= 0.1; }
            
            // UI 更新
            document.getElementById('val-health').innerText = Math.floor(dad.health);
            document.getElementById('val-addiction').innerText = Math.floor(dad.addiction);
            document.getElementById('bar-health').style.width = dad.health + '%';
            document.getElementById('bar-addiction').style.width = dad.addiction + '%';

            // 命名演進
            let adj = "廢物毒蟲";
            if (dad.addiction < 5) adj = "好老爹";
            else if (dad.addiction < 20) adj = "普通的毒蟲";
            else if (dad.addiction > 80) adj = "神智不清的惡質毒蟲";
            document.getElementById('dad-title').innerText = `${config.playerName}的${adj}老爹`;

            // 粒子更新
            if (["RAINY", "THUNDER", "TYPHOON"].includes(weather)) {
                let pCount = weather === "TYPHOON" ? 8 : 3;
                for(let i=0; i<pCount; i++) {
                    particles.push({
                        x: Math.random() * 300, 
                        y: 0, 
                        v: 4 + Math.random()*4, 
                        w: weather === "TYPHOON" ? 2 : 0 
                    });
                }
            }
            particles = particles.filter(p => {
                p.y += p.v; p.x -= p.w;
                return p.y < 180;
            });

            if (weather === "THUNDER" && Math.random() > 0.98) flashEffect = 1;
            if (flashEffect > 0) flashEffect -= 0.05;
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 280, 180);
            
            const now = getTargetTime();
            const hour = now.getHours();

            // 1. 窗外環境 (Window Area: 40, 20, 100, 70)
            let skyColor = "#0f172a"; // 夜晚
            if (hour >= 5 && hour < 8) skyColor = "#4338ca"; // 黎明
            if (hour >= 8 && hour < 16) skyColor = "#0ea5e9"; // 白天
            if (hour >= 16 && hour < 19) skyColor = "#7c2d12"; // 夕陽
            
            // 天候對天空顏色的影響
            if (["RAINY", "THUNDER", "TYPHOON", "CLOUDY"].includes(weather)) {
                ctx.fillStyle = "#334155"; // 陰天灰
            } else {
                ctx.fillStyle = skyColor;
            }
            ctx.fillRect(40, 20, 100, 70);

            // 天文體
            if (hour < 5 || hour >= 19) {
                // 星星
                ctx.fillStyle = "#fff";
                starField.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));
                // 月亮
                ctx.fillStyle = "#fef08a";
                ctx.beginPath(); ctx.arc(110, 40, 6, 0, Math.PI*2); ctx.fill();
            } else if (weather === "SUNNY") {
                // 太陽
                ctx.fillStyle = "#fbbf24";
                ctx.beginPath(); ctx.arc(60, 40, 8, 0, Math.PI*2); ctx.fill();
                // 太陽光暈
                ctx.shadowBlur = 10; ctx.shadowColor = "#fbbf24";
                ctx.beginPath(); ctx.arc(60, 40, 9, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 降雨粒子
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 1;
            particles.forEach(p => {
                if (p.x > 40 && p.x < 140 && p.y > 20 && p.y < 90) {
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.w, p.y+4); ctx.stroke();
                }
            });

            // 2. 室內結構
            ctx.fillStyle = "#020617"; // 牆面暗部
            ctx.fillRect(0,0,40,180); ctx.fillRect(140,0,140,180);
            ctx.fillRect(40, 0, 100, 20); ctx.fillRect(40, 90, 100, 90);
            
            // 窗框
            ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 4;
            ctx.strokeRect(40, 20, 100, 70);
            ctx.beginPath(); ctx.moveTo(90, 20); ctx.lineTo(90, 90); ctx.stroke();

            // 地板
            ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 140, 280, 40);

            // 3. 老爹
            const breathe = Math.sin(Date.now()/500) * 1.5;
            const dx = 200, dy = 140;
            ctx.fillStyle = "#fecaca"; // 皮膚
            ctx.fillRect(dx-4, dy-30+breathe, 8, 10);
            ctx.fillStyle = "#334155"; // 髒衣
            ctx.fillRect(dx-6, dy-20+breathe, 12, 18);
            ctx.fillStyle = "#000"; // 眼睛
            ctx.fillRect(dx-3, dy-26+breathe, 2, 2); ctx.fillRect(dx+1, dy-26+breathe, 2, 2);

            // 4. 全局光照遮罩 (根據時區時間)
            let dark = 0;
            if (hour < 5 || hour >= 20) dark = 0.7;
            else if (hour < 7 || hour >= 18) dark = 0.4;
            
            // 陰天天氣加深
            if (["RAINY", "THUNDER", "TYPHOON"].includes(weather)) dark += 0.2;
            dark = Math.min(0.85, dark);

            ctx.fillStyle = `rgba(0, 0, 0, ${dark})`;
            ctx.fillRect(0, 0, 280, 180);

            // 閃電效果
            if (flashEffect > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flashEffect})`;
                ctx.fillRect(0, 0, 280, 180);
            }
        }

        function tick() {
            updateLogic();
            draw();
            requestAnimationFrame(tick);
        }

        setInterval(fetchWeather, 60000); // 每一分鐘更新天氣
    </script>
</body>
</html>
